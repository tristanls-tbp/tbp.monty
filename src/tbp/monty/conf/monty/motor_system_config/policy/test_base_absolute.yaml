_target_: tbp.monty.frameworks.models.motor_policies.BasePolicy
action_sampler:
  _target_: tbp.monty.frameworks.actions.action_samplers.UniformlyDistributedSampler
  actions:
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetAgentPitch}
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetSensorPitch}
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetYaw}
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetAgentPose}
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetSensorRotation}
  - ${monty.class:tbp.monty.frameworks.actions.actions.SetSensorPose}
agent_id: ${monty.agent_id:agent_id_0}
